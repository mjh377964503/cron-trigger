name: Trigger Investment Pipeline

on:
  # 零持仓暂停，仅保留手动触发
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger
        env:
          PAT: ${{ secrets.INVESTMENT_PAT }}
        run: |
          curl -X POST \
            "https://api.github.com/repos/mjh377964503/investment-knowledge/actions/workflows/285038872/dispatches" \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main","inputs":{"mode":"pre_market"}}'
